// Practical + Also block (structural template)
function wsPracticalHtml(style, prefix, wsData) {
  const p = wsMakePrefix(style.name);
  const meta = style.meta || {};
  const ws = wsData || {};
  const isIndian = /bollyw|bhangra|bollyfolk|semi.class|garba|kalb|indian/i.test(style.name);
  const isBarefoot = isIndian || /yoga/i.test(style.name);
  const isFlamenco = /flamen/i.test(style.name);

  // What to wear — use wsData.wear if present, else style-based default
  const wearText = ws.wear || (
    isFlamenco  ? 'Flamenco dress or skirt, flamenco shoes (heels recommended). Never barefoot.' :
    isBarefoot  ? 'Comfortable dancewear. Come barefoot — no shoes in Studio Aakash.' :
                  'Comfortable, form-fitting dancewear. Appropriate dance shoes or socks.'
  );

  // What to bring — use wsData.bring if present, else generic
  const bringText = ws.bring || (meta.whatToBring || 'Water bottle.');

  const alsoCards = ws.alsoStyles && ws.alsoStyles.length
    ? ws.alsoStyles.map(s => `  <div class="also-card">
    <h3>${s.name}</h3>
    <div class="also-meta">${s.meta || ''}</div>
    <span class="also-cta">View →</span>
    <a class="also-link" href="${s.slug}" aria-label="${s.name}"></a>
  </div>`).join('\n')
    : `  <!-- "Also at Shoonya" — choose 3 related styles.
  Copy the solid-purple div+overlay pattern from squarespace-build-guide.md.
  Replace style names, slugs, and day/level info. -->
  <div class="also-card">
    <h3>Style Name</h3>
    <div class="also-meta">Day · Level</div>
    <span class="also-cta">View →</span>
    <a class="also-link" href="/style-page-slug" aria-label="Style Name"></a>
  </div>`;

  // Partner info strip — structured fields
  const hasPartnerInfo = ws.partnerRequired || ws.practiceEvening || ws.levelGuide;
  const partnerForumUrl = ws.partnerForumUrl || 'https://www.facebook.com/groups/1405926722822445';
  const partnerStripHtml = hasPartnerInfo ? (() => {
    const rows = [];
    if (ws.partnerRequired) {
      rows.push(`<div class="${p}-pi-row">
      <span class="${p}-pi-icon" aria-hidden="true">👫</span>
      <span class="${p}-pi-text"><strong>Partner registration required</strong> — please register together with your dance partner. Looking for a partner? <a href="${partnerForumUrl}">Join the Shoonya Dance Forum →</a></span>
    </div>`);
    }
    if (ws.practiceEvening) {

// ─── Per-level card HTML ───────────────────────────────────────────────────
function wsPerLevelCard(lv, idx, meta, prefix, isStarterSeries, levelDesc) {
  const p = prefix;
  const slots = lv.slots || [];
  const slot = slots[0] || {};
  const sc    = lv.sessionCount || WS_STD_SESSIONS;
  // Canonical price from slot duration (correct even when multiple levels share one meta.fullPrice)
  const price = wsComputePrice(slot.duration || null, sc, meta.fullPrice, meta.studentPrice);

  // Multi-slot: parallel timings (same level, different days e.g. Tue + Wed)
  const isMultiSlot = slots.length > 1;

  let priceLabel = '';
  if (price) {
    const { full: fp, student: sp, uitpas: up } = price;
    if (isStarterSeries) {
      priceLabel = `<div class="${p}-price-row">
          <div class="${p}-price-col"><div class="${p}-price-amount">€${fp}</div><div class="${p}-price-label">Full price</div></div>
        </div>`;
    } else {
      priceLabel = `<div class="${p}-price-row">
          <div class="${p}-price-col"><div class="${p}-price-amount">€${fp}</div><div class="${p}-price-label">Full</div></div>
          <div class="${p}-price-col"><div class="${p}-price-amount">€${sp || '—'}</div><div class="${p}-price-label">Student / 2+</div></div>
          <div class="${p}-price-col"><div class="${p}-price-amount">€${up}</div><div class="${p}-price-label">UiTPAS −80%</div></div>
        </div>`;
    }
  }

  const levelName = lv.level || ('Level ' + (idx + 1));
  const isL2plus = /level [2-9]|l[2-9]/i.test(levelName);
  const _lvNum = parseInt((levelName.match(/\d+/) || [])[0]);
  const _l2Label = _lvNum >= 4 ? 'Advanced' : _lvNum === 3 ? 'Intermediate' : 'Prior experience needed';
  const badgeClass = isStarterSeries ? '' : (isL2plus ? `${p}-badge-l2` : '');
  const badgeText = isStarterSeries ? '4-week series' : (isL2plus ? _l2Label : 'Beginners welcome');
  const cardClass = isStarterSeries ? `${p}-level-card ${p}-starter` : `${p}-level-card`;

  // When field: show all slots if parallel timings, otherwise just slot[0]
  const whenHtml = isMultiSlot
    ? slots.map(s => `<span style="display:block;">${s.day || '?'} ${s.start || ''}–${s.end || ''}</span>`).join('')
    : `${slot.day || '?'} ${slot.start || ''}–${slot.end || ''}`;

  // Dates: merge all slots' dates, dedupe, sort
  const _allDates = [...new Set(slots.flatMap(s => s.dates || []))].sort();
  const datesHtml = _allDates.length
    ? `<details class="${p}-date-list"><summary>${sc} sessions · Sep–Jan · see all dates</summary>
          <div class="${p}-date-grid">${_allDates.map(d => {
            const dt = new Date(d + 'T12:00:00');
            const dayNames = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
            const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
            return `<span>${dayNames[dt.getDay()]} ${dt.getDate()} ${months[dt.getMonth()]}</span>`;
          }).join('')}</div>
        </details>`
    : `<!-- dates not yet in sheet — run runApplyPersonalExclusions() to populate col S -->`;

  const teacherAnchor = (slot.teacher || '').toLowerCase().split(' ')[0] || 'teacher';

  const registerUrl = isStarterSeries ? WS_ZOHO_STARTER_URL : WS_REG_URL;

  const descBlock = levelDesc
    ? `<div class="${p}-level-desc">${levelDesc}</div>`
    : '';

  return `        <div class="${cardClass}">
          <div class="${p}-card-top">
            <div>
              <div class="${p}-level-title">${levelName}</div>
              ${isStarterSeries
                ? `<div class="${p}-level-who">4-week intro — enrol any semester start</div>`
                : isL2plus
                  ? `<div class="${p}-level-who"><!-- tagline e.g. "Building on the foundation." --></div>`
                  : `<div class="${p}-level-who">No experience needed. Start here.</div>`
              }
            </div>
            <div class="${p}-level-badge ${badgeClass}">${badgeText}</div>
          </div>
          ${descBlock}
          <div class="${p}-level-meta">
            <div class="${p}-meta-item"><strong>When</strong><span>${whenHtml}</span></div>
            <div class="${p}-meta-item"><strong>Where</strong><span>${slot.studio ? 'Studio ' + slot.studio : '?'}</span></div>
            <div class="${p}-meta-item"><strong>Teacher</strong><span>${slot.teacher || '?'}${slot.coTeachers ? ' & ' + slot.coTeachers : ''}</span></div>
            <div class="${p}-meta-item"><strong>Duration</strong><span>${slot.duration || '?'} min</span></div>
          </div>
          ${datesHtml}
          ${priceLabel}
          <a class="${p}-register-link register-link" href="${registerUrl}">Register →</a>
        </div>`;
}

// ─── Day-based card HTML (for 5+ levels or back-to-back same day) ──────────
function wsDayCard(dayName, dayLevels, meta, prefix, descs) {
  const p = prefix;

  // Sort chronologically by start time so cards read in clock order
  dayLevels = [...dayLevels].sort((a, b) => (a.slot.start || '').localeCompare(b.slot.start || ''));

  // Detect whether all levels share the same teacher
  const _uniqueTeachers = [...new Set(dayLevels.map(e => (e.slot.teacher || '').trim()).filter(Boolean))];
  const _allSameTeacher = _uniqueTeachers.length <= 1;

  // Build level-by-level time rows
  const levelRows = dayLevels.map((entry, i) => {
    const lv = entry.lv;
    const slot = entry.slot;
    const sc = lv.sessionCount || WS_STD_SESSIONS;
    // Canonical price from slot duration — correct even for mixed-duration day cards
    const price = wsComputePrice(slot.duration || null, sc, meta.fullPrice, meta.studentPrice);
    const fp = price ? price.full    : null;
    const sp = price ? price.student : null;
    const up = price ? price.uitpas  : null;
    const isL2plus = /level [2-9]|l[2-9]/i.test(lv.level || '');
    const _dNum = parseInt(((lv.level || '').match(/\d+/) || [])[0]);
    const _dLabel = isL2plus ? (_dNum >= 4 ? 'Advanced' : _dNum === 3 ? 'Intermediate' : 'Prior experience needed') : 'Beginners welcome';
    const levelDesc = descs ? (descs[lv.level] || descs['Level ' + _dNum] || '') : '';
    return `<div class="${p}-day-level">
              <div class="${p}-day-level-row">
                <span class="${p}-day-level-name">${lv.level || 'Level'}</span>
                <span class="${p}-day-level-time">${slot.start || ''}–${slot.end || ''} · ${slot.duration || '?'} min</span>
                <span class="${p}-day-level-badge ${isL2plus ? p + '-badge-l2' : ''}">${_dLabel}</span>
              </div>
              ${fp ? `<div class="${p}-day-pricing">€${fp}${sp ? ' · €' + sp + ' student' : ''} · €${up} UiTPAS</div>` : ''}
              ${!_allSameTeacher ? `<div class="${p}-day-level-teacher">Teacher: ${slot.teacher || '?'}</div>` : ''}
              ${levelDesc ? `<details class="${p}-day-desc"${i === 0 ? ' open' : ''}><summary class="${p}-day-desc-sum">About this level</summary><p class="${p}-day-desc-text">${levelDesc}</p></details>` : ''}
            </div>`;
  }).join('');

  // Use first slot for When/Where/Teacher
  const firstSlot = (dayLevels[0] && dayLevels[0].slot) || {};
  const lastSlot  = (dayLevels[dayLevels.length - 1] && dayLevels[dayLevels.length - 1].slot) || {};
  const timeRange = `${firstSlot.start || ''}–${lastSlot.end || ''}`;
  const teacherAnchor = (firstSlot.teacher || '').toLowerCase().split(' ')[0] || 'teacher';

  const datesHtml = (firstSlot.dates && firstSlot.dates.length)
    ? `<details class="${p}-date-list"><summary>${dayLevels[0].lv.sessionCount || 14} sessions · Sep–Jan · see all dates</summary>
          <div class="${p}-date-grid">${[...firstSlot.dates].sort().map(d => {
            const dt = new Date(d + 'T12:00:00');
            const dayNames = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
            const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
            return `<span>${dayNames[dt.getDay()]} ${dt.getDate()} ${months[dt.getMonth()]}</span>`;
          }).join('')}</div>
        </details>`
    : '';

  return `        <div class="${p}-level-card">
          <div class="${p}-card-top">
            <div>
              <div class="${p}-level-title">${dayName} evenings</div>
              <div class="${p}-level-who">${dayLevels.map(e => e.lv.level || 'Level').join(' + ')}</div>
            </div>
            <div class="${p}-level-badge">${dayLevels.length} classes</div>
          </div>
          <div class="${p}-day-levels">${levelRows}</div>
          <hr style="border:none;border-top:1px solid #e4e0db;margin:.85rem 0;">
          <div class="${p}-level-meta">
            <div class="${p}-meta-item"><strong>When</strong><span>${dayName} ${timeRange}</span></div>
            <div class="${p}-meta-item"><strong>Where</strong><span>${firstSlot.studio ? 'Studio ' + firstSlot.studio : '?'}</span></div>
            <div class="${p}-meta-item"><strong>Teacher</strong><span>${_allSameTeacher
              ? (firstSlot.teacher || '?') + (firstSlot.coTeachers ? ' & ' + firstSlot.coTeachers : '')
              : dayLevels.map(e => `${e.lv.level}: ${e.slot.teacher || '?'}`).join('<br>')
            }</span></div>
          </div>
          ${datesHtml}
          <a class="${p}-register-link register-link" href="${WS_REG_URL}">Register →</a>
        </div>`;
}

// ─── Full Levels & Registration code block ─────────────────────────────────
function wsLevelsHtml(style, descsByLevel, wsData) {
  const meta   = style.meta   || {};
  const levels = Array.isArray(style.levels) ? style.levels : [];
  const _descs = (descsByLevel && Object.keys(descsByLevel).length ? descsByLevel : null) || meta.descByLevel || {};
  const p      = wsMakePrefix(style.name);
  const layout = wsClassifyLayout(levels);

  // Collect all unique days for semester-tag
  const allDays = [];
  levels.forEach(lv => (lv.slots || []).forEach(s => { if (s.day && !allDays.includes(s.day)) allDays.push(s.day); }));
  const dayOrder = ['Monday','Tuesday','Wednesday','Thursday','Friday','Saturday','Sunday'];
  allDays.sort((a, b) => dayOrder.indexOf(a) - dayOrder.indexOf(b));
  // Determine time-of-day label per day from first matching slot
  const _slotsByDay = {};
  levels.forEach(lv => (lv.slots || []).forEach(s => { if (s.day && !_slotsByDay[s.day]) _slotsByDay[s.day] = s; }));
  const _timeLabel = s => {
    const h = parseInt((s.start || '00:00').split(':')[0]);
    return h < 12 ? 'mornings' : h < 17 ? 'afternoons' : 'evenings';
  };
  const semesterTagDays = allDays.map(d => wsShortDay(d) + ' ' + (_slotsByDay[d] ? _timeLabel(_slotsByDay[d]) : 'evenings')).join(' + ');

  // Count how many cards will actually render — per-level: one per level; day-based: one per unique day
  const renderedCardCount = layout === 'day'
    ? dayOrder.filter(d => allDays.includes(d)).length
    : levels.length;
  const isSingleCard = renderedCardCount === 1;
  const gridCols = isSingleCard ? '1fr' : '1fr 1fr';
  const gridExtra = isSingleCard ? 'max-width:640px;margin:0 auto;' : '';

  // Generate cards
  let cardsHtml = '';
  if (layout === 'per-level') {
    cardsHtml = levels.map((lv, i) => {
      const isStarter = /starter/i.test(lv.level || '');
      const levelDesc = _descs[lv.level] || _descs['Level ' + (i + 1)] || '';
      return wsPerLevelCard(lv, i, meta, p, isStarter, levelDesc);
    }).join('\n');
  } else {
    // Day-based: group slots by day
    const byDay = {};
    levels.forEach(lv => {
      (lv.slots || []).forEach(slot => {
        const day = slot.day || 'Unknown';
        if (!byDay[day]) byDay[day] = [];
        byDay[day].push({ lv, slot });
      });
    });
    dayOrder.filter(d => byDay[d]).forEach(day => {
      cardsHtml += wsDayCard(day, byDay[day], meta, p, _descs) + '\n';
    });
  }

  const fullCss = `<link href="${WS_GOOGLE_FONTS}" rel="stylesheet">

// ── Squarespace HTML validator ────────────────────────────────────────────────
// Catches known Squarespace code-block traps BEFORE the user copies.
// Returns [] if clean, or [{level:'error'|'warn', msg, fix}] for each issue.
function wsValidateHtml(html) {
  const issues = [];

  // 1. Double quotes inside <style> blocks — breaks Squarespace's HTML sanitizer,
  //    causing the rest of the CSS to render as visible text on the page.
  const styleBlocks = [...html.matchAll(/<style[^>]*>([\s\S]*?)<\/style>/gi)];
  for (const m of styleBlocks) {
    if (/"/.test(m[1])) {
      const sample = m[1].match(/[^\n]*"[^\n]*/)?.[0]?.trim().slice(0, 80) || '';
      issues.push({
        level: 'error',
        msg: 'Double quotes inside a <style> block',
        fix: `Squarespace's sanitizer breaks out of <style> at the first ". Use single quotes in CSS attribute selectors: [for='id'] not [for="id"]. Near: ${sample}…`
      });
    }
  }

  // 2. <a> tags without pointer-events:auto — Squarespace theme can zero out
  //    pointer-events, making buttons and links unclickable.
  const aRules = [...html.matchAll(/a\.[a-z-]+[^{]*\{([^}]+)\}/gi)];
  const hasPointerEvents = aRules.some(m => /pointer-events\s*:\s*auto/i.test(m[1]));
  const hasAnchorRules   = aRules.length > 0;
  if (hasAnchorRules && !hasPointerEvents) {
    issues.push({
      level: 'warn',
      msg: '<a> rules missing pointer-events:auto!important',
      fix: 'Add pointer-events:auto!important;cursor:pointer!important to every <a> rule (all pseudo-states). Squarespace theme can disable clicks on links inside code blocks.'
    });
  }

  // 3. <a> rules missing full pseudo-state chain — Squarespace paints <a> purple
  //    on :link and :visited even if :hover is overridden.
  if (hasAnchorRules && !/:visited/.test(html)) {
    issues.push({
      level: 'warn',
      msg: '<a> rules missing :visited pseudo-state',
      fix: 'Squarespace theme overrides <a> on :link and :visited. Include full chain: a.cls, a.cls:link, a.cls:visited, a.cls:hover, a.cls:focus, a.cls:active.'
    });
  }

  // 4. Block wrapper with max-width or auto margins — double-constrains layout.
  if (/max-width\s*:\s*\d/.test(html) || /margin\s*:\s*0\s+auto/.test(html)) {
    issues.push({
      level: 'warn',
      msg: 'Block wrapper has max-width or margin:0 auto',
      fix: 'Squarespace section settings control outer width. Remove max-width and margin:auto from wrappers — use width:100% only.'
    });
  }

  // 5. Inline style with hard-coded px widths on the outermost wrapper (fragile).
  // (light check — only flag if the outermost div has a fixed width in style="")
  const outerDiv = html.match(/^<div[^>]*style="([^"]*)"[^>]*>/i);
  if (outerDiv && /width\s*:\s*\d+px/.test(outerDiv[1])) {
    issues.push({
      level: 'warn',
      msg: 'Outermost div has a fixed pixel width in style=""',
      fix: 'Use width:100% on wrappers. Fixed px widths break at different Squarespace section widths.'
    });
  }

  return issues;
}

// Show validation banner above a block when issues are found
function wsShowValidationBanner(containerId, issues) {
  const existing = document.getElementById(containerId + '-vbanner');
  if (existing) existing.remove();
  if (!issues.length) return;
  const errors = issues.filter(i => i.level === 'error');
  const warns  = issues.filter(i => i.level === 'warn');
  const color  = errors.length ? '#c0392b' : '#b7770d';
  const bg     = errors.length ? '#fdf0ee' : '#fefae8';
  const label  = errors.length ? `🚨 ${errors.length} error${errors.length > 1 ? 's' : ''}` : '';
  const wLabel = warns.length  ? `⚠️ ${warns.length} warning${warns.length > 1 ? 's' : ''}` : '';
  const items  = issues.map(i =>
    `<div style="margin:.4rem 0;padding:.4rem .6rem;border-left:3px solid ${i.level==='error'?'#c0392b':'#e67e22'};background:rgba(0,0,0,.04);">
      <strong style="font-size:.8rem;">${i.msg}</strong>
      <div style="font-size:.76rem;color:#555;margin-top:.2rem;">${i.fix}</div>
    </div>`
  ).join('');
  const banner = document.createElement('div');
  banner.id = containerId + '-vbanner';
  banner.style.cssText = `margin-bottom:.5rem;padding:.6rem .75rem;border-radius:6px;border:1px solid ${color};background:${bg};font-family:system-ui,sans-serif;`;
  banner.innerHTML = `<div style="font-weight:700;color:${color};font-size:.82rem;margin-bottom:.3rem;">${[label,wLabel].filter(Boolean).join(' · ')} — fix before deploying to Squarespace</div>${items}`;
  const container = document.getElementById(containerId);
  if (container) container.parentNode.insertBefore(banner, container);
}

// Copy a textarea or code-area by ID
// Convert non-ASCII chars to numeric HTML entities so Squarespace's
// Code-block editor (which often mis-decodes UTF-8 as MacRoman/Latin-1)
// renders €/–/→/·/emoji correctly instead of as mojibake (,Äì ,Üí ,Ç).
function wsAsciiSafe(str) {
  return String(str || '').replace(/[^\x00-\x7F]/g, c => '&#' + c.codePointAt(0) + ';');
}

async function wscopyCb(btn, id) {
  const el = document.getElementById(id);
  if (!el) return;
  const text = el.tagName === 'TEXTAREA' ? el.value : el.textContent;

  // Run Squarespace validator and show banner (non-blocking — user can still copy)
  const issues = wsValidateHtml(text || '');
  wsShowValidationBanner(id, issues);

  try {
    await navigator.clipboard.writeText(wsAsciiSafe(text || ''));
    const orig = btn.textContent;
    btn.classList.add('copied');
    btn.textContent = issues.length ? `✓ Copied (${issues.length} issue${issues.length>1?'s':''})` : '✓ Copied';
    setTimeout(() => { btn.classList.remove('copied'); btn.textContent = orig; }, 2500);
  } catch (err) {
    alert('Copy failed — select the text manually.');
  }
}

// ── Helpers ────────────────────────────────────────────────────────────────
function escHtml(s) {
  return String(s == null ? '' : s)
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
}
function escAttr(s) { return escHtml(s).replace(/"/g, '&quot;'); }
function cssEscape(s) {
  // Minimal CSS attribute selector escape — only worry about quotes.
  return String(s).replace(/["\\]/g, '\\$&');
}
