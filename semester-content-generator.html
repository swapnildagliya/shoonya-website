<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>Block Studio — Shoonya Dance Centre</title>
<style>
  :root {
    --ink:        #1a1a1a;
    --warm:       #c8521a;
    --warm-soft:  #fdf3ec;
    --teal:       #1a7a6e;
    --gold:       #b8860b;
    --muted:      #6b6560;
    --border:     #e4e0db;
    --bg:         #f5f4f1;
    --white:      #ffffff;
    --partner:    #f4c542;
    --classical:  #d8e2dc;
    --culture:    #f6c1c7;
    --radius:     8px;
    --sidebar-w:  280px;
    --danger:     #c62828;
    --success:    #2e7d32;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, sans-serif;
         background: var(--bg); color: var(--ink); font-size: 14px; line-height: 1.5; }

  /* ── Layout ── */
  .app { display: flex; height: 100vh; overflow: hidden; }
  .sidebar { width: var(--sidebar-w); flex-shrink: 0; background: var(--ink);
             color: var(--white); display: flex; flex-direction: column; overflow: hidden; }
  .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

  /* ── Sidebar ── */
  .sidebar-header { padding: 1.2rem 1rem .8rem; border-bottom: 1px solid rgba(255,255,255,.1); }
  .sidebar-header .brand { font-size: .68rem; font-weight: 700; letter-spacing: .12em;
                          text-transform: uppercase; color: #aaa; margin-bottom: .25rem; }
  .sidebar-header h1 { font-size: 1.05rem; font-weight: 700; color: var(--white); }
  .sidebar-header .meta { font-size: .7rem; color: #888; margin-top: .35rem; }

  .sidebar-search { padding: .65rem .75rem; border-bottom: 1px solid rgba(255,255,255,.1); }
  .sidebar-search input { width: 100%; background: rgba(255,255,255,.1);
                          border: 1px solid rgba(255,255,255,.15); border-radius: 6px;
                          padding: .42rem .65rem; color: var(--white); font-size: .82rem; outline: none; }
  .sidebar-search input::placeholder { color: #888; }
  .sidebar-search input:focus { border-color: var(--warm); }

  .sidebar-list { flex: 1; overflow-y: auto; padding: .25rem 0 1.5rem; }

  .sidebar-special { padding: 0 .75rem .35rem; }
  .sidebar-special .item { display: flex; align-items: center; gap: .5rem;
                           padding: .55rem .65rem; border-radius: 6px; cursor: pointer;
                           font-size: .85rem; color: #ddd; background: rgba(255,255,255,.04);
                           border-left: 3px solid var(--gold); transition: background .12s; }
  .sidebar-special .item:hover { background: rgba(255,255,255,.09); color: var(--white); }
  .sidebar-special .item.active { background: var(--gold); color: var(--ink); }
  .sidebar-special .item .ico { font-size: 1rem; }

  .sidebar-cat { padding: .9rem 1rem .25rem; font-size: .62rem; font-weight: 700;
                 letter-spacing: .12em; text-transform: uppercase; color: #777;
                 display: flex; align-items: center; gap: .45rem; }
  .sidebar-cat .pip { width: 8px; height: 8px; border-radius: 2px; flex-shrink: 0; }
  .sidebar-cat .pip.partner   { background: var(--partner); }
  .sidebar-cat .pip.classical { background: var(--classical); }
  .sidebar-cat .pip.culture   { background: var(--culture); }

  .sidebar-item { display: flex; align-items: center; justify-content: space-between;
                  padding: .42rem 1rem; cursor: pointer; font-size: .85rem;
                  color: #cdcdcd; transition: background .12s; gap: .5rem; }
  .sidebar-item:hover { background: rgba(255,255,255,.07); color: var(--white); }
  .sidebar-item.active { background: var(--warm); color: var(--white); }
  .sidebar-item .style-name { flex: 1; line-height: 1.3; }
  .sidebar-item .levels-count { font-size: .68rem; color: #888;
                                 background: rgba(255,255,255,.08); padding: .1rem .4rem;
                                 border-radius: 99px; flex-shrink: 0; }
  .sidebar-item.active .levels-count { background: rgba(255,255,255,.2); color: #fff; }

  .sidebar-footer { padding: .8rem 1rem; border-top: 1px solid rgba(255,255,255,.1);
                    font-size: .7rem; color: #777; }

  /* ── Top bar ── */
  .topbar { background: var(--white); border-bottom: 1px solid var(--border);
            padding: .75rem 1.5rem; display: flex; align-items: center;
            justify-content: space-between; flex-shrink: 0; gap: 1rem; }
  .topbar-left h2 { font-size: 1rem; font-weight: 700; }
  .topbar-left .sub { font-size: .78rem; color: var(--muted); margin-top: .12rem; }
  .topbar-right { display: flex; align-items: center; gap: 1rem; font-size: .8rem; color: var(--muted); }
  .topbar-right strong { color: var(--ink); }
  .reload-btn { background: var(--white); border: 1px solid var(--border);
                color: var(--ink); padding: .42rem .9rem; border-radius: 6px;
                font-size: .8rem; font-weight: 600; cursor: pointer; display: flex;
                align-items: center; gap: .4rem; transition: background .12s, border-color .12s; }
  .reload-btn:hover { background: var(--bg); border-color: var(--warm); }
  .reload-btn.loading { opacity: .6; pointer-events: none; }
  .reload-btn .spinner { display: inline-block; width: 12px; height: 12px;
                         border: 2px solid var(--border); border-top-color: var(--warm);
                         border-radius: 50%; animation: spin .8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── Preview pane ── */
  .preview-pane { flex: 1; overflow-y: auto; padding: 1.5rem 2rem 4rem; background: var(--bg); }
  .preview-pane.has-toc { display: grid; grid-template-columns: minmax(0, 1fr) 160px; gap: 2rem; align-items: start; }
  .preview-pane .preview-main { min-width: 0; }
  .preview-header { display: flex; align-items: center; justify-content: space-between;
                    margin-bottom: 1.25rem; gap: 1rem; flex-wrap: wrap; }
  .preview-header h3 { font-size: 1.15rem; font-weight: 700; }
  .preview-header .meta-line { font-size: .8rem; color: var(--muted); margin-top: .15rem; }
  .copy-btn { background: var(--teal); color: var(--white); border: none;
              border-radius: 6px; padding: .58rem 1.3rem; font-size: .82rem;
              font-weight: 700; cursor: pointer; transition: background .15s;
              display: inline-flex; align-items: center; gap: .4rem; }
  .copy-btn:hover { background: #145f55; }
  .copy-btn.copied { background: var(--success); }
  .copy-btn-sm { background: var(--white); color: var(--ink); border: 1px solid var(--border);
                 padding: .3rem .65rem; font-size: .72rem; font-weight: 600; cursor: pointer;
                 border-radius: 5px; transition: background .12s, border-color .12s; }
  .copy-btn-sm:hover { border-color: var(--teal); color: var(--teal); }
  .copy-btn-sm.copied { background: var(--success); color: #fff; border-color: var(--success); }

  .section-label { font-size: .68rem; font-weight: 700; letter-spacing: .1em;
                   text-transform: uppercase; color: var(--muted); margin-bottom: .6rem; }
  .preview-frame { background: var(--white); border: 1px solid var(--border);
                   border-radius: var(--radius); padding: 1.5rem; margin-bottom: 1.5rem; }
  .code-area { background: #1e1e2e; border-radius: var(--radius); padding: 1rem;
               font-family: 'Menlo', 'Monaco', 'Courier New', monospace; font-size: .72rem;
               color: #cdd6f4; white-space: pre-wrap; word-break: break-word;
               overflow-x: auto; max-height: 280px; overflow-y: auto; line-height: 1.5; }

  details.raw { background: var(--white); border: 1px solid var(--border);
                border-radius: var(--radius); padding: 0; margin-bottom: 1.5rem; }
  details.raw summary { padding: .9rem 1.2rem; font-size: .82rem; font-weight: 600;
                        cursor: pointer; color: var(--muted); }
  details.raw summary:hover { color: var(--ink); }
  details.raw[open] summary { border-bottom: 1px solid var(--border); }
  details.raw .body { padding: 1rem 1.2rem; }

  /* ── Section cards ── */
  .section { background: var(--white); border: 1px solid var(--border);
             border-radius: var(--radius); padding: 1.25rem 1.5rem; margin-bottom: 1.25rem;
             scroll-margin-top: 1rem; }
  .section-head { display: flex; align-items: center; justify-content: space-between;
                  gap: .75rem; margin-bottom: .75rem; flex-wrap: wrap; }
  .section-title { font-size: .95rem; font-weight: 700; color: var(--ink);
                   display: flex; align-items: center; gap: .5rem; }
  .section-title .tag { font-size: .65rem; font-weight: 700; letter-spacing: .08em;
                        text-transform: uppercase; background: var(--warm-soft);
                        color: var(--warm); padding: .15rem .55rem; border-radius: 99px; }
  .section-title .tag.muted { background: #f0ede7; color: var(--muted); }
  .section-sub { font-size: .8rem; color: var(--muted); margin-top: -.2rem; margin-bottom: .9rem; }

  .kv-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
             gap: .65rem 1rem; font-size: .85rem; }
  .kv-item .k { font-size: .68rem; font-weight: 700; letter-spacing: .07em;
                text-transform: uppercase; color: var(--muted); margin-bottom: .1rem; }
  .kv-item .v { color: var(--ink); font-weight: 500; line-height: 1.35; word-wrap: break-word; }
  .kv-item .v.empty { color: #b8b3a8; font-weight: 400; font-style: italic; }
  .kv-item .v a { color: var(--teal); }

  .body-text { font-size: .9rem; line-height: 1.6; color: var(--ink); white-space: pre-wrap; }
  .body-text.muted { color: var(--muted); font-style: italic; }

  .level-card { background: var(--bg); border: 1px solid var(--border);
                border-radius: 6px; padding: .9rem 1rem; margin-bottom: .75rem; }
  .level-card:last-child { margin-bottom: 0; }
  .level-head { display: flex; align-items: baseline; justify-content: space-between;
                gap: .75rem; flex-wrap: wrap; margin-bottom: .5rem; }
  .level-head .level-label { font-size: .82rem; font-weight: 700; color: var(--ink); }
  .level-head .level-label .sublabel { font-weight: 500; color: var(--muted); font-size: .76rem; margin-left: .35rem; }
  .level-head .level-meta { font-size: .76rem; color: var(--muted); }
  .slot-row { display: flex; gap: .5rem; align-items: baseline; font-size: .82rem;
              color: var(--ink); padding: .25rem 0; flex-wrap: wrap; }
  .slot-row .day { font-weight: 600; min-width: 80px; }
  .slot-row .time { color: var(--muted); }
  .slot-row .teacher { color: var(--teal); font-weight: 500; }
  .slot-row .studio { color: var(--muted); font-size: .76rem; }

  .warn-note { background: #fff8e1; border-left: 3px solid var(--gold);
               padding: .5rem .75rem; border-radius: 4px; font-size: .76rem;
               color: #5f4c00; margin-top: .65rem; line-height: 1.5; }
  .warn-note strong { color: #3d3000; }

  /* ── Open Deurdag ── */
  .od-header { display: flex; align-items: center; justify-content: space-between;
               gap: 1rem; margin-bottom: 1.25rem; flex-wrap: wrap; }
  .od-date-toggle { display: flex; gap: .35rem; flex-wrap: wrap; }
  .od-date-btn { background: var(--white); border: 1px solid var(--border);
                 color: var(--ink); padding: .5rem 1rem; font-size: .82rem;
                 font-weight: 600; cursor: pointer; border-radius: 6px;
                 transition: all .12s; }
  .od-date-btn:hover { border-color: var(--teal); color: var(--teal); }
  .od-date-btn.active { background: var(--teal); color: var(--white); border-color: var(--teal); }

  .od-bucket { background: var(--white); }
  .od-bucket-morn  { border-left: 4px solid #ffb84d; }
  .od-bucket-aftn  { border-left: 4px solid #f4c542; }
  .od-bucket-eve   { border-left: 4px solid #6b2fa0; }
  .od-bucket-any   { border-left: 4px solid var(--teal); }
  .od-bucket-unk   { border-left: 4px solid #b8b3a8; }
  .od-bucket-no    { border-left: 4px solid #c62828; opacity: .82; }
  .od-rows { display: flex; flex-direction: column; gap: .35rem; }
  .od-row { display: grid; grid-template-columns: minmax(200px, 1fr) minmax(220px, 1.5fr);
            gap: .85rem; align-items: center;
            padding: .55rem .7rem; background: var(--bg); border-radius: 6px;
            border: 1px solid transparent; transition: border-color .1s; }
  .od-row:hover { border-color: var(--border); }
  .od-row-main { min-width: 0; }
  .od-row-style { font-weight: 600; font-size: .9rem; color: var(--ink); }
  .od-row-teacher { font-size: .76rem; color: var(--muted); margin-top: .1rem; }
  .od-row-email { color: #b8b3a8; font-size: .7rem; }
  .od-row-note input { width: 100%; padding: .35rem .6rem; font-size: .8rem;
                       border: 1px solid var(--border); border-radius: 4px;
                       background: var(--white); color: var(--ink); outline: none; font-family: inherit; }
  .od-row-note input:focus { border-color: var(--teal); }
  .od-row-note input::placeholder { color: #c2bcb3; }

  @media (max-width: 720px) {
    .od-row { grid-template-columns: 1fr; gap: .4rem; }
  }

  /* ── Sticky TOC ── */
  .toc { position: sticky; top: 1rem; align-self: start; font-size: .78rem; }
  .toc .toc-label { font-size: .62rem; font-weight: 700; letter-spacing: .12em;
                    text-transform: uppercase; color: var(--muted); margin-bottom: .4rem;
                    padding: 0 .5rem; }
  .toc a { display: block; padding: .3rem .6rem; color: var(--muted); text-decoration: none;
           border-left: 2px solid transparent; line-height: 1.35; transition: all .1s; }
  .toc a:hover { color: var(--ink); border-left-color: var(--border); }
  .toc a.active { color: var(--warm); border-left-color: var(--warm); font-weight: 600; }
  @media (max-width: 1100px) { .preview-pane.has-toc { grid-template-columns: 1fr; }
                               .toc { display: none; } }

  /* ── States ── */
  .empty-state, .loading-state, .error-state {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    height: 100%; color: var(--muted); text-align: center; padding: 2rem; gap: .75rem;
  }
  .empty-state .ico, .loading-state .ico, .error-state .ico { font-size: 2.25rem; }
  .empty-state p, .loading-state p, .error-state p { max-width: 380px; font-size: .9rem; }
  .error-state { color: var(--danger); }
  .error-state pre { font-family: 'Menlo', 'Monaco', monospace; font-size: .72rem;
                     background: var(--white); color: var(--ink); padding: .8rem 1rem;
                     border: 1px solid var(--border); border-radius: 6px;
                     max-width: 540px; overflow-x: auto; white-space: pre-wrap;
                     word-break: break-word; text-align: left; }
  .retry-btn { background: var(--warm); color: var(--white); border: none;
               border-radius: 6px; padding: .55rem 1.2rem; font-size: .82rem;
               font-weight: 700; cursor: pointer; }
  .retry-btn:hover { background: #a8431a; }

  .setup-notice { background: #fff8e1; border: 1px solid #ffe082;
                  border-left: 4px solid var(--gold); border-radius: 6px;
                  padding: 1rem 1.2rem; margin: 1rem 1.5rem 0; font-size: .82rem;
                  color: #5f4c00; line-height: 1.55; }
  .setup-notice strong { color: #3d3000; }
  .setup-notice code { background: rgba(0,0,0,.08); padding: .1rem .35rem;
                       border-radius: 3px; font-family: 'Menlo', monospace; font-size: .72rem; }

  /* ── Website section ── */
  .ws-nav { display: flex; gap: .4rem; flex-wrap: wrap; margin-bottom: 1.25rem; }
  .ws-tab { background: var(--white); border: 1px solid var(--border); color: var(--muted);
            padding: .35rem .85rem; border-radius: 99px; font-size: .78rem; font-weight: 600;
            cursor: pointer; transition: all .12s; white-space: nowrap; }
  .ws-tab:hover { border-color: var(--warm); color: var(--warm); }
  .ws-tab.active { background: var(--warm); border-color: var(--warm); color: var(--white); }

  .ws-block { margin-bottom: 1.25rem; }
  .ws-block-head { display: flex; align-items: center; justify-content: space-between;
                   gap: .75rem; margin-bottom: .5rem; flex-wrap: wrap; }
  .ws-block-title { font-size: .72rem; font-weight: 700; letter-spacing: .1em;
                    text-transform: uppercase; color: var(--muted); display: flex;
                    align-items: center; gap: .45rem; }
  .ws-block-title .ws-badge { font-size: .62rem; font-weight: 700; padding: .12rem .5rem;
                               border-radius: 99px; }
  .ws-badge.native { background: #e8f5e9; color: #2e7d32; }
  .ws-badge.code   { background: #e3f2fd; color: #1565c0; }
  .ws-badge.note   { background: #fff8e1; color: #856404; }

  .ws-text-area { width: 100%; min-height: 72px; padding: .65rem .8rem;
                  font-size: .83rem; font-family: -apple-system, BlinkMacSystemFont,
                  'Segoe UI', Helvetica, sans-serif; line-height: 1.55;
                  border: 1px solid var(--border); border-radius: 6px;
                  background: var(--white); color: var(--ink); resize: vertical; outline: none; }
  .ws-text-area:focus { border-color: var(--warm); }
  .ws-text-area.placeholder-text { color: var(--muted); font-style: italic; }

  .ws-code-area { background: #1e1e2e; border-radius: 6px; padding: .9rem 1rem;
                  font-family: 'Menlo', 'Monaco', 'Courier New', monospace; font-size: .7rem;
                  color: #cdd6f4; white-space: pre-wrap; word-break: break-word;
                  overflow-x: auto; max-height: 260px; overflow-y: auto; line-height: 1.5; }
  .ws-note-box { background: #fff8e1; border-left: 3px solid var(--gold);
                 padding: .55rem .8rem; border-radius: 4px; font-size: .78rem;
                 color: #5f4c00; line-height: 1.5; }

  .ws-divider { border: none; border-top: 1px solid var(--border); margin: 1rem 0; }

  .ws-layout-badge { display: inline-flex; align-items: center; gap: .35rem;
                     font-size: .72rem; font-weight: 700; padding: .2rem .65rem;
                     border-radius: 99px; margin-bottom: 1rem; }
  .ws-layout-badge.per-level { background: #e8f5e9; color: #2e7d32; }
  .ws-layout-badge.day-based { background: #e3f2fd; color: #1565c0; }

  /* ── SEO block ── */
  .ws-seo-wrap { border: 1px solid var(--border); border-radius: 6px; overflow: hidden; }
  .ws-seo-row  { display: flex; align-items: center; gap: .5rem; margin-bottom: .25rem; }
  .ws-seo-label{ font-size: .68rem; font-weight: 700; letter-spacing: .1em;
                 text-transform: uppercase; color: var(--muted); flex: 1; }
  .ws-seo-count{ font-size: .7rem; font-weight: 600; color: var(--teal); }
  .ws-seo-count.over { color: var(--danger); }
  .ws-seo-field{ padding: .75rem .85rem; }
  .ws-seo-field + .ws-seo-field { border-top: 1px solid var(--border); }
  .ws-seo-value{ font-size: .82rem; line-height: 1.5; color: var(--ink);
                 background: var(--bg); border-radius: 4px;
                 padding: .4rem .6rem; margin-top: .2rem; word-break: break-word; }

  /* ── Scrollbar ── */
  ::-webkit-scrollbar { width: 7px; height: 7px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #c2bcb3; border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: #a8a298; }
</style>
</head>
<body>

<div class="app">

  <!-- ── Sidebar ── -->
  <aside class="sidebar">
    <div class="sidebar-header">
      <div class="brand">Shoonya Dance Centre</div>
      <h1>Block Studio</h1>
      <div class="meta" id="sidebar-meta">Loading…</div>
    </div>
    <div class="sidebar-search">
      <input type="text" id="search" placeholder="Search styles…" oninput="filterStyles(this.value)">
    </div>
    <div class="sidebar-list" id="sidebar-list">
      <div style="padding:1.5rem 1rem;color:#777;font-size:.8rem;">Loading…</div>
    </div>
    <div class="sidebar-footer" id="sidebar-footer">Live from Master Schedule</div>
  </aside>

  <!-- ── Main ── -->
  <div class="main">

    <!-- Top bar -->
    <div class="topbar">
      <div class="topbar-left">
        <h2 id="topbar-title">Block Studio</h2>
        <div class="sub" id="topbar-sub">Select a style or the trial banner to preview a paste-ready block.</div>
      </div>
      <div class="topbar-right">
        <span id="generated-at"></span>
        <button class="reload-btn" id="reload-btn" onclick="loadData()">↻ Reload</button>
      </div>
    </div>

    <!-- Preview pane -->
    <div class="preview-pane" id="preview-pane">
      <div class="loading-state">
        <div class="ico">⏳</div>
        <p>Loading the latest blocks from Master Schedule…</p>
      </div>
    </div>

  </div>
</div>

<script>
// ═══════════════════════════════════════════════════════════
// Block Studio — live viewer for paste-ready Squarespace blocks
//
// Data source: Apps Script web app endpoint, `doGet` in output-generator.gs.
// Returns JSON: { semester, generatedAt, styles, trialBanner }
//
// Setup: publish the script as a web app (Deploy → New deployment),
// then paste the /exec URL into WEB_APP_URL below.
// ═══════════════════════════════════════════════════════════

// WEB_APP_URL: the Apps Script /exec endpoint that serves the JSON data.
//
// Two delivery contexts:
//   1. Hosted inside Apps Script HTML Service (when Wim opens /exec?ui=1) —
//      the server injects the real /exec URL via the `<?!= execUrl ?>`
//      template tag. We can't use location.href here because Apps Script
//      serves the page in a sandboxed googleusercontent.com iframe.
//   2. Opened from file:// or a self-hosted clone — the template tag isn't
//      replaced, so we fall back to the hardcoded /exec URL.
const WEB_APP_URL = (function () {
  var injected = '<?!= execUrl ?>';
  // Apps Script replaced the tag with a real URL → use it
  if (injected.indexOf('https://script.google.com') === 0) return injected;
  // Template tag survived as-is → we're not in Apps Script, fall back
  return 'https://script.google.com/macros/s/AKfycbwh9PSrNxMUkBaMayhyfnU3XDzL76khEm7RL932CJ83qqm7dTG9afA-WB1cZYKSrcs3/exec';
})();

const SEMESTER = 'Sep 2026 – Jan 2027';

const CATEGORY_META = {
  partner:   { label: 'Partner & Social Dance', pip: 'partner'   },
  classical: { label: 'Classical & Technique',  pip: 'classical' },
  culture:   { label: 'Culture & Wellness',     pip: 'culture'   },
  unknown:   { label: 'Other',                   pip: 'classical' },
};

const CATEGORY_ORDER = ['partner', 'classical', 'culture', 'unknown'];

let currentData = null;       // last fetched payload
let currentSelection = null;  // { kind: 'style' | 'banner', id: '...' }

// ── Initial load ──────────────────────────────────────────────────────────
window.addEventListener('DOMContentLoaded', loadData);

function isUrlConfigured() {
  return WEB_APP_URL && !/PASTE_YOUR_DEPLOY_URL_HERE/.test(WEB_APP_URL);
}

async function loadData() {
  if (!isUrlConfigured()) {
    renderSetupNotice();
    return;
  }
  const reloadBtn = document.getElementById('reload-btn');
  reloadBtn.classList.add('loading');
  reloadBtn.innerHTML = '<span class="spinner"></span> Loading…';

  const pane = document.getElementById('preview-pane');
  pane.classList.remove('has-toc');
  pane.innerHTML = `
    <div class="loading-state">
      <div class="ico">⏳</div>
      <p>Fetching the latest blocks from Master Schedule…<br>
      (Apps Script cold start takes a few seconds.)</p>
    </div>
  `;

  try {
    const url = WEB_APP_URL + '?semester=' + encodeURIComponent(SEMESTER);
    const res = await fetch(url, { method: 'GET', redirect: 'follow' });
    if (!res.ok) throw new Error('HTTP ' + res.status + ' ' + res.statusText);
    const data = await res.json();
    currentData = data;
    renderSidebar(data);
    renderTopbarMeta(data);
    // If the previous selection still exists, re-render it. Otherwise show prompt.
    if (currentSelection) {
      if (currentSelection.kind === 'banner' && data.trialBanner) {
        renderTrialBanner(data.trialBanner);
      } else if (currentSelection.kind === 'opendeurdag' && data.openDeurdag) {
        renderOpenDeurdag(data.openDeurdag, currentSelection.date);
      } else if (currentSelection.kind === 'style') {
        const found = (data.styles || []).find(s => s.id === currentSelection.id);
        if (found) renderStyle(found);
        else renderEmptyState();
      }
    } else {
      renderEmptyState();
    }
  } catch (err) {
    renderErrorState(err);
  } finally {
    reloadBtn.classList.remove('loading');
    reloadBtn.innerHTML = '↻ Reload';
  }
}

// ── Sidebar ────────────────────────────────────────────────────────────────
function renderSidebar(data) {
  const list = document.getElementById('sidebar-list');
  const styles = data.styles || [];
  // Bucket by category
  const byCat = {};
  CATEGORY_ORDER.forEach(c => byCat[c] = []);
  styles.forEach(s => {
    const c = byCat[s.category] ? s.category : 'unknown';
    byCat[c].push(s);
  });

  let html = '';

  // Trial banner + Open Deurdag pseudo-items at top
  let specialHtml = '';
  if (data.trialBanner) {
    specialHtml += `<div class="item" data-kind="banner" onclick="selectBanner()">
        <span class="ico">★</span>
        <span style="flex:1;">Trial-week banner</span>
        <span style="font-size:.7rem;color:#888;">${escAttr(data.trialBanner.range)}</span>
      </div>`;
  }
  // Always show Open Deurdag entry. Empty-state messaging lives in the view.
  {
    var odDates = data.openDeurdag ? Object.keys(data.openDeurdag).sort() : [];
    var odCount = odDates.length;
    var odLabel = odCount ? (odCount + ' date' + (odCount > 1 ? 's' : '')) : 'no data yet';
    specialHtml += `<div class="item" data-kind="opendeurdag" onclick="selectOpenDeurdag()" style="border-left-color: #1a7a6e;">
        <span class="ico">🏠</span>
        <span style="flex:1;">Open Deurdag</span>
        <span style="font-size:.7rem;color:#888;">${odLabel}</span>
      </div>`;
  }
  if (specialHtml) html += `<div class="sidebar-special">${specialHtml}</div>`;

  CATEGORY_ORDER.forEach(cat => {
    const items = byCat[cat];
    if (!items.length) return;
    const meta = CATEGORY_META[cat] || CATEGORY_META.unknown;
    html += `<div class="sidebar-cat"><span class="pip ${meta.pip}"></span>${meta.label}</div>`;
    items.sort((a, b) => a.name.localeCompare(b.name));
    items.forEach(s => {
      const levelsCount = countLevelsFromText(s.text);
      html += `<div class="sidebar-item" data-kind="style" data-id="${escAttr(s.id)}"
                onclick="selectStyle('${escAttr(s.id)}')">
        <span class="style-name">${escHtml(s.name)}</span>
        ${levelsCount ? `<span class="levels-count">${levelsCount}</span>` : ''}
      </div>`;
    });
  });

  list.innerHTML = html;
  document.getElementById('sidebar-meta').textContent =
    `${styles.length} styles · ${SEMESTER}`;
  applyActiveSelection();
}

function countLevelsFromText(text) {
  // Look for the "Time:" section's level lines (single-day) or the per-day
  // sections (multi-day). Quick heuristic: count distinct "Level X" / "Open Level"
  // / "Foundation" mentions in the level prefix of each line.
  if (!text) return 0;
  const m = text.match(/^(Level [^:]*|Open Level|Foundation|Foundations|[A-Z][a-z]+ Level)[^:]*:/gm);
  if (!m) return 0;
  return [...new Set(m.map(s => s.trim()))].length;
}

function applyActiveSelection() {
  document.querySelectorAll('.sidebar-item, .sidebar-special .item').forEach(el => {
    el.classList.remove('active');
  });
  if (!currentSelection) return;
  if (currentSelection.kind === 'banner') {
    const el = document.querySelector('.sidebar-special .item[data-kind="banner"]');
    if (el) el.classList.add('active');
  } else if (currentSelection.kind === 'opendeurdag') {
    const el = document.querySelector('.sidebar-special .item[data-kind="opendeurdag"]');
    if (el) el.classList.add('active');
  } else if (currentSelection.kind === 'style') {
    const el = document.querySelector(`.sidebar-item[data-id="${cssEscape(currentSelection.id)}"]`);
    if (el) el.classList.add('active');
  }
}

function filterStyles(q) {
  const query = (q || '').toLowerCase().trim();
  document.querySelectorAll('.sidebar-item').forEach(el => {
    const name = (el.querySelector('.style-name')?.textContent || '').toLowerCase();
    el.style.display = (!query || name.includes(query)) ? '' : 'none';
  });
  // Hide category headers that have no visible items underneath
  document.querySelectorAll('.sidebar-cat').forEach(hdr => {
    let next = hdr.nextElementSibling;
    let anyVisible = false;
    while (next && next.classList.contains('sidebar-item')) {
      if (next.style.display !== 'none') { anyVisible = true; break; }
      next = next.nextElementSibling;
    }
    hdr.style.display = anyVisible ? '' : 'none';
  });
}

// ── Selection / preview ────────────────────────────────────────────────────
function selectStyle(id) {
  if (!currentData) return;
  const style = (currentData.styles || []).find(s => s.id === id);
  if (!style) return;
  currentSelection = { kind: 'style', id };
  applyActiveSelection();
  renderStyle(style);
}

function selectBanner() {
  if (!currentData || !currentData.trialBanner) return;
  currentSelection = { kind: 'banner' };
  applyActiveSelection();
  renderTrialBanner(currentData.trialBanner);
}

function selectOpenDeurdag(date) {
  if (!currentData || !currentData.openDeurdag) return;
  const dates = Object.keys(currentData.openDeurdag).sort();
  if (!dates.length) return;
  const targetDate = date || (currentSelection && currentSelection.kind === 'opendeurdag' && currentSelection.date) || dates[0];
  currentSelection = { kind: 'opendeurdag', date: targetDate };
  applyActiveSelection();
  renderOpenDeurdag(currentData.openDeurdag, targetDate);
}

        </div>

        <details class="raw" style="margin-bottom:0;margin-top:.75rem;">
          <summary>▾ Raw HTML (what gets copied)</summary>

        </details>
      </section>

      <!-- METADATA -->

      <section class="section" id="sec-meta">
        <div class="section-head">
          <div class="section-title">Style metadata</div>
        </div>
        <div class="kv-grid">
          ${kvField('Full price',           meta.fullPrice    ? '€' + meta.fullPrice    : null)}
          ${kvField('Student / 2+ price',   meta.studentPrice ? '€' + meta.studentPrice : null)}
          ${kvField('UiTPAS (80% off full)',meta.fullPrice    ? '€' + (Math.round(meta.fullPrice * 0.2 * 100) / 100) : null)}
          ${kvField('Partner required',     meta.partnerRequired ? 'Yes' : 'No')}
          ${kvField('Language',             meta.language)}
          ${kvField('Minimum age',          meta.ageMin)}
          ${kvField('Co-teacher (style)',   meta.coTeacher)}

            ? `<div class="kv-item"><div class="k">Registration</div>
                <div class="v"><a href="${escAttr(meta.registrationUrl)}" target="_blank" rel="noopener">Open form ↗</a></div></div>` : ''}
        </div>

      <!-- DESCRIPTION -->
      ${ meta.description ? `
      <section class="section" id="sec-description">
        <div class="section-head">
          <div>
            <div class="section-title">

      <!-- NOTES -->
      ${ (meta.whatToBring || meta.prereq || meta.websiteNote) ? `

          ${kvField('What to bring',  meta.whatToBring, { multiline: true })}

// ── Section helpers ──────────────────────────────────────────────────────
function hasAnyMeta(meta) {
  return !!(meta && (meta.fullPrice || meta.studentPrice || meta.partnerRequired ||
            meta.language || meta.ageMin || meta.coTeacher || meta.registrationUrl));
}

function kvField(label, value, opts) {
  opts = opts || {};
  const isEmpty = !value;
  const display = isEmpty ? '—' : value;
  const multiline = opts.multiline ? 'style="white-space:pre-wrap;"' : '';
  return `<div class="kv-item">
    <div class="k">${escHtml(label)}</div>
    <div class="v${isEmpty ? ' empty' : ''}" ${multiline}>${escHtml(display)}</div>
  </div>`;
}

function renderDescriptionBody(meta) {
  const byLevel = meta.descByLevel || {};
  const keys    = Object.keys(byLevel);
  if (keys.length > 1) {
    // Per-level descriptions — render as stacked sub-blocks, each with its own copy button
    return keys.map(k => `
      <div style="margin:0 0 1rem 0;padding:.7rem .9rem;background:var(--bg);border-radius:6px;">
        <div style="display:flex;align-items:center;justify-content:space-between;gap:.5rem;margin-bottom:.3rem;">
          <div style="font-size:.7rem;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--warm);">${escHtml(k)}</div>
          <button class="copy-btn-sm" onclick='copyAnyText(this, ${JSON.stringify(byLevel[k])})'>⧉ Copy</button>
        </div>
        <div class="body-text">${escHtml(byLevel[k])}</div>
      </div>
    `).join('');
  }
  // Single combined text (or only one level)
  return `<div class="body-text">${escHtml(meta.description)}</div>`;
}

function renderLevelCard(lv, idx, meta) {
  const slots = Array.isArray(lv.slots) ? lv.slots : [];
  const sessionLabel = lv.sessionCount ? `${lv.sessionCount} sessions` : '';
  // Per-level prorated price (full × sessions/16, nearest €)
  const standardSessions = 16;
  let prorate = '';
  if (meta.fullPrice && lv.sessionCount && lv.sessionCount !== standardSessions) {
    const propor = Math.round(meta.fullPrice * lv.sessionCount / standardSessions);
    const stProp = meta.studentPrice ? Math.ceil(meta.studentPrice * lv.sessionCount / standardSessions) : null;
    prorate = `€${propor}${stProp ? ' · €' + stProp + ' student' : ''}`;
  } else if (meta.fullPrice) {
    prorate = `€${meta.fullPrice}${meta.studentPrice ? ' · €' + meta.studentPrice + ' student' : ''}`;
  }

  return `
    <section class="section" id="sec-level-${idx}">
      <div class="section-head">
        <div>
          <div class="section-title">
            ${escHtml(lv.level || ('Level ' + (idx + 1)))}
            ${ lv.displayLabel ? `<span class="tag muted">${escHtml(lv.displayLabel)}</span>` : '' }
          </div>
          <div class="section-sub">${ sessionLabel }${ sessionLabel && prorate ? ' · ' : '' }${ prorate }</div>
        </div>
      </div>
      <div>
        ${ slots.length === 0
            ? '<div class="body-text muted">No slots defined.</div>'
            : slots.map(s => `
              <div class="slot-row">
                <span class="day">${escHtml(s.day || '')}</span>
                <span class="time">${escHtml(s.start || '')}–${escHtml(s.end || '')} <span class="studio">(${s.duration || '?'} min)</span></span>
                ${ s.teacher    ? `<span class="teacher">with ${escHtml(s.teacher)}${ s.coTeachers ? ' + ' + escHtml(s.coTeachers) : '' }</span>` : '' }
                ${ s.studio     ? `<span class="studio">| ${escHtml(s.studio)}</span>` : '' }
              </div>
            `).join('')
        }
        ${ slots[0] && slots[0].dates && slots[0].dates.length
            ? `<div style="margin-top:.6rem;font-size:.76rem;color:var(--muted);">
                <strong style="color:var(--ink);">Dates:</strong> ${ formatDateList(slots[0].dates) }
              </div>` : '' }
      </div>
    </section>
  `;
}

function formatDateList(isoArr) {
  if (!isoArr || !isoArr.length) return '';
  const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const byMonth = {};
  const order = [];
  isoArr.slice().sort().forEach(iso => {
    const d = new Date(iso + 'T12:00:00');
    const key = d.getFullYear() + '-' + String(d.getMonth()).padStart(2, '0');
    if (!byMonth[key]) { byMonth[key] = { month: months[d.getMonth()], days: [] }; order.push(key); }
    byMonth[key].days.push(d.getDate());
  });
  return order.map(k => byMonth[k].month + ' ' + byMonth[k].days.join(', ')).join(' · ');
}

function setupTocScrollSpy(paneEl) {
  const tocLinks = paneEl.querySelectorAll('.toc a');
  const sections = Array.from(paneEl.querySelectorAll('.section'));
  if (!tocLinks.length || !sections.length) return;
  function update() {
    let activeId = sections[0].id;
    const offset = paneEl.scrollTop + 80;
    for (const sec of sections) {
      if (sec.offsetTop <= offset) activeId = sec.id;
      else break;
    }
    tocLinks.forEach(a => a.classList.toggle('active', a.dataset.target === activeId));
  }
  // Smooth scroll on click — preventDefault so we don't get a hash navigation
  tocLinks.forEach(a => a.addEventListener('click', e => {
    e.preventDefault();
    const target = paneEl.querySelector('#' + a.dataset.target);
    if (target) paneEl.scrollTo({ top: target.offsetTop - 16, behavior: 'smooth' });
  }));
  paneEl.addEventListener('scroll', update, { passive: true });
  update();
}

async function copyAnyText(btn, text) {
  try {
    await navigator.clipboard.writeText(wsAsciiSafe(text || ''));
    btn.classList.add('copied');
    const original = btn.textContent;
    btn.textContent = '✓ Copied';
    setTimeout(() => { btn.classList.remove('copied'); btn.textContent = original; }, 1500);
  } catch (err) {
    alert('Copy failed — manually select the text.');
  }
}

// ── Open Deurdag view ──────────────────────────────────────────────────────
const OD_BUCKET_META = {
  morn: { label: 'Morning',    ico: '🌅', order: 1 },
  aftn: { label: 'Afternoon',  ico: '☀️', order: 2 },
  eve:  { label: 'Evening',    ico: '🌆', order: 3 },
  any:  { label: 'All day',    ico: '🕐', order: 4 },
  unk:  { label: 'Available (preference unknown)', ico: '❓', order: 5 },
  no:   { label: 'Not available', ico: '❌', order: 6 },
};

function _odBucketKey(entry) {
  if (!entry.available) return 'no';
  const t = (entry.time || '').toLowerCase();
  if (t === 'morn' || t === 'aftn' || t === 'eve' || t === 'any') return t;
  return 'unk';
}

function _odFmtDate(iso) {
  const d = new Date(iso + 'T12:00:00');
  const days   = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  return days[d.getDay()] + ' ' + d.getDate() + ' ' + months[d.getMonth()] + ' ' + d.getFullYear();
}

function _odNoteKey(date, style) {
  return 'od:' + date + ':' + style;
}
function _odGetNote(date, style) {
  try { return localStorage.getItem(_odNoteKey(date, style)) || ''; }
  catch (e) { return ''; }
}
function _odSetNote(date, style, value) {
  try {
    if (value) localStorage.setItem(_odNoteKey(date, style), value);
    else localStorage.removeItem(_odNoteKey(date, style));
  } catch (e) { /* localStorage full or disabled — silent */ }
}

function renderOpenDeurdag(openDeurdag, activeDate) {
  const pane = document.getElementById('preview-pane');
  pane.classList.remove('has-toc');

  const allDates = Object.keys(openDeurdag).sort();
  if (!allDates.length) {
    pane.innerHTML = `<div class="empty-state"><div class="ico">🏠</div>
      <p>No Open Deurdag submissions yet.</p></div>`;
    return;
  }
  if (!activeDate || allDates.indexOf(activeDate) === -1) activeDate = allDates[0];

  const entries = openDeurdag[activeDate] || [];
  // Group by bucket
  const buckets = {};
  entries.forEach(e => {
    const k = _odBucketKey(e);
    if (!buckets[k]) buckets[k] = [];
    buckets[k].push(e);
  });
  // Sort each bucket alphabetically by style
  Object.keys(buckets).forEach(k => buckets[k].sort((a, b) => a.style.localeCompare(b.style)));

  // Date toggle buttons
  const dateToggle = allDates.map(d => `
    <button class="od-date-btn ${d === activeDate ? 'active' : ''}"
            onclick="selectOpenDeurdag('${escAttr(d)}')">
      ${escHtml(_odFmtDate(d))}
    </button>
  `).join('');

  // Stats row
  const totalAvailable = entries.filter(e => e.available).length;
  const totalNot       = entries.length - totalAvailable;
  const unknownCount   = (buckets.unk || []).length;

  // Find which styles are missing entirely from this date (not yet submitted)
  const styleIdsWithData = new Set(entries.map(e => e.style));
  const missingStyles = (currentData.styles || [])
    .filter(s => !styleIdsWithData.has(s.name))
    .map(s => s.name);

  document.getElementById('topbar-title').textContent = 'Open Deurdag — ' + _odFmtDate(activeDate);
  document.getElementById('topbar-sub').textContent =
    `${totalAvailable} available · ${totalNot} not available${unknownCount ? ' · ' + unknownCount + ' missing preference (re-submit or check email)' : ''}`;

  pane.innerHTML = `
    <div class="od-header">
      <div class="od-date-toggle">${dateToggle}</div>
      <button class="copy-btn" onclick='copyOpenDeurdagText("${escAttr(activeDate)}")'>⧉ Copy as plain text</button>

    ${ renderOpenDeurdagBuckets(buckets, activeDate) }

    ${ missingStyles.length ? `

      <div class="section-head">

        ${ missingStyles.map(s => `<li>${escHtml(s)}</li>`).join('') }

    </section>` : '' }

    <p style="margin-top:1.5rem;font-size:.78rem;color:var(--muted);line-height:1.5;">
      <strong>Notes</strong> are saved on this browser only (localStorage) — useful for off-the-record info like
      "Shirley messaged: post 16:00". They aren't synced anywhere.
    </p>
  `;
}

function renderOpenDeurdagBuckets(buckets, activeDate) {
  const orderedKeys = Object.keys(OD_BUCKET_META).sort((a, b) => OD_BUCKET_META[a].order - OD_BUCKET_META[b].order);
  return orderedKeys.filter(k => (buckets[k] || []).length).map(k => {
    const meta = OD_BUCKET_META[k];
    const items = buckets[k];
    return `
      <section class="section od-bucket od-bucket-${k}" id="sec-od-${k}">
        <div class="section-head">
          <div class="section-title">${meta.ico} ${escHtml(meta.label)} <span class="tag muted">${items.length}</span></div>
        </div>
        <div class="od-rows">
          ${ items.map(e => renderOpenDeurdagRow(e, activeDate)).join('') }
        </div>
      </section>
    `;
  }).join('');
}

function renderOpenDeurdagRow(e, activeDate) {
  const noteId = 'od-note-' + activeDate.replace(/-/g, '') + '-' + e.style.toLowerCase().replace(/[^a-z0-9]+/g, '-');
  const savedNote = _odGetNote(activeDate, e.style);
  return `
    <div class="od-row">
      <div class="od-row-main">
        <div class="od-row-style">${escHtml(e.style)}</div>
        <div class="od-row-teacher">${escHtml(e.teacher)}${ e.email ? ` <span class="od-row-email">${escHtml(e.email)}</span>` : '' }</div>
      </div>
      <div class="od-row-note">
        <input type="text" id="${noteId}" value="${escAttr(savedNote)}"
               placeholder="Add a note (saved locally)…"
               oninput="_odSetNote('${escAttr(activeDate)}','${escAttr(e.style)}', this.value)">
      </div>
    </div>
  `;
}

async function copyOpenDeurdagText(activeDate) {
  const od = (currentData && currentData.openDeurdag) || {};
  const entries = od[activeDate] || [];
  if (!entries.length) return;
  const buckets = {};
  entries.forEach(e => {
    const k = _odBucketKey(e);
    if (!buckets[k]) buckets[k] = [];
    buckets[k].push(e);
  });
  Object.keys(buckets).forEach(k => buckets[k].sort((a, b) => a.style.localeCompare(b.style)));

  const lines = ['Open Deurdag — ' + _odFmtDate(activeDate), ''];
  Object.keys(OD_BUCKET_META).sort((a, b) => OD_BUCKET_META[a].order - OD_BUCKET_META[b].order).forEach(k => {
    const items = buckets[k];
    if (!items || !items.length) return;
    const meta = OD_BUCKET_META[k];
    lines.push(meta.ico + ' ' + meta.label.toUpperCase());
    items.forEach(e => {
      const note = _odGetNote(activeDate, e.style);
      lines.push('  • ' + e.style + ' — ' + e.teacher + (note ? ' (note: ' + note + ')' : ''));
    });
    lines.push('');
  });
  const text = lines.join('\n').trim();
  const btn = event.currentTarget;
  try {
    await navigator.clipboard.writeText(text);
    btn.classList.add('copied');
    btn.innerHTML = '✓ Copied';
    setTimeout(() => { btn.classList.remove('copied'); btn.innerHTML = '⧉ Copy as plain text'; }, 1500);
  } catch (err) {
    alert('Copy failed — manually select the text from the page.');
  }
}

// ── Copy buttons ───────────────────────────────────────────────────────────
function copyHtml(btn, id) {
  if (!currentData) return;
  const idClean = String(id).replace(/^"|"$/g, '');
  const style = (currentData.styles || []).find(s => s.id === idClean);
  if (!style) return;
  copyToClipboard(style.html, btn);
}

function copyBannerHtml(btn) {
  if (!currentData || !currentData.trialBanner) return;
  copyToClipboard(currentData.trialBanner.html, btn);
}

async function copyToClipboard(text, btn) {
  try {
    await navigator.clipboard.writeText(wsAsciiSafe(text));
    btn.classList.add('copied');
    btn.innerHTML = '✓ Copied!';
    setTimeout(() => {
      btn.classList.remove('copied');
      btn.innerHTML = '⧉ Copy HTML';
    }, 1500);
  } catch (err) {
    alert('Copy failed — manually select the Raw HTML section.');
  }
}

  'Lindy Hop': {
    teacherLabel: 'Upside Down',
    hook: 'The original swing dance — joyful, improvised, and built on real musical connection.',
    description: 'Lindy Hop is the original swing dance, born in Harlem in the 1920s and 30s alongside jazz music. It\'s a partner dance built on improvisation, playfulness, and a deep relationship with the music. Upside Down\'s approach is accessible and grounded in the historical roots — classes build social dancing skills alongside technique, with the "Everybody Leads, Everybody Follows" principle keeping everything open to everyone.',
    teachers: [
      {
        name: 'Upside Down', isOrg: true,
        photo:  'https://images.squarespace-cdn.com/content/v1/643161d3f0077c58bb466e03/7b75af25-3db8-437d-8529-66067223e30a/Upside+Down+Logo',
        bio:    'Upside Down is a Ghent-based organisation that, in addition to organising many swing, jazz and blues events and festivals, spreads its passion for these dance cultures at Shoonya. Classes are accessible and playful, aimed at developing social connection, sense of community, improvisation, personal expression and sense of rhythm. Thanks to the Everybody Leads, Everybody Follows principle, anyone can participate.',
        social: [
          { type:'website',   url:'https://upside-down.be/',                         label:'upside-down.be' },
          { type:'instagram', url:'https://www.instagram.com/upsidedown_be/',        label:'@upsidedown_be' }
        ]
      },
      {
        name:   'Sep Vermeersch',
        photo:  'https://images.squarespace-cdn.com/content/v1/643161d3f0077c58bb466e03/3bc22dc8-fd8c-49c3-ba5c-7090854a4d82/Jazzin%27+Sep+Vermeersch+-+By+Juls+Sobron.jpg',
        photoCredit: 'Juls Sobron',
        origin: 'Ghent, Belgium',
        bio:    'Sep is a Ghent-based dancer, active as a teacher, versatile artist, MC, DJ and artistic director at Upside Down. His excellent reputation reaches far beyond the borders. Thanks to his great passion for the historical background of dance cultures, and an inexhaustible creativity, he knows how to move young and old.',
        social: [
          { type:'instagram', url:'https://www.instagram.com/sep.vermeersch/', label:'@sep.vermeersch' }

      },
      {
        name:   'Leni Denorme',

        photoCredit: 'Robyn Coggans',
        bio:    'Leni is an experienced and passionate teacher of swing dance, known for her commitment to the swing community in Ghent. She knows how to inspire dancers from diverse backgrounds in a playful and accessible way. Besides teaching, Leni never tires from organizing and performing within the scene as part of Upside Down.',
        social: [

      {
        name:   'Ann-Sofie Van Enis',

        photoCredit: 'Leyla Hesna',
        bio:    'An eternal student, Ann-Sofie likes to delve into the history of jazz music and dance, sharing her learning in each class. She introduces everyone to musicality and personal expression in an approachable way. In addition to teaching, she organizes events and projects for Upside Down.',
        social: [
          { type:'instagram', url:'https://www.instagram.com/annsofievanenis/', label:'@annsofievanenis' },

      'Foundation': 'Foundation is the entry point to Lindy Hop at Shoonya. No experience needed — the class builds from scratch: the pulse, the basic footwork patterns, and the connection between lead and follow. Following Upside Down\'s Everybody Leads, Everybody Follows principle, both roles are taught from day one.',

    hook: 'Your feet become the instrument — rhythm, precision, and the joy of making music with every step.',
    wear: 'Tap dance shoes. Beginners: shoes are available to borrow free of charge for your first year — no purchase needed to start.',
    description: 'Tap dance is rhythm made visible — dancers create percussion with metal taps on their shoes, building complex rhythmic patterns through footwork drills, musicality, and improvisation. Tapdance Promotion offers classes from beginner through advanced, taught by Lut Vermeulen, Alexandre, Teddy, and Jordan Souvandjiev. The organisation has been the home of tap dance in Ghent for decades and runs the annual Ghent Tap Festival.',
    social: [
      { type:'website',   url:'http://tapdans.be',                              label:'tapdans.be' },
      { type:'instagram', url:'https://www.instagram.com/tapdancepromotion',    label:'@tapdancepromotion' },

    ],
    teachers: [
      { name: 'Tapdance Promotion', pageSlug: null, isOrg: true,
        photo: 'https://images.squarespace-cdn.com/content/v1/643161d3f0077c58bb466e03/875295d1-0831-425f-ad90-2cccd4c83040/Untitled+%28Instagram+Post%29.png',
        bio: 'Tapdance Promotion has been the home of tap dance in Ghent for decades. The organisation offers classes from beginner through advanced level, runs the annual Ghent Tap Festival, and brings together a team of teachers united by a deep love for rhythm, musicality, and performance.',
        social: [
          { type:'website',   url:'http://tapdans.be',                                label:'tapdans.be' },
          { type:'instagram', url:'https://www.instagram.com/tapdancepromotion',      label:'@tapdancepromotion' },

        ]
      },
      { name: 'Lut Vermeulen', pageSlug: null,
        photo: 'https://images.squarespace-cdn.com/content/643161d3f0077c58bb466e03/a3198a83-5401-4f79-a06e-e9dac36ef5d5/LUT.jpg?content-type=image%2Fjpeg',
        origin: 'Belgium',
        tags: [{text:'Tap Dance', type:'style'},{text:'Founder', type:'award'}],
        stats: [{v:'NY & Paris', l:'trained'},{v:'1996', l:'first production'}],
        bioShort: 'Studied physical education in Ghent, then trained for five years in Belgium, the Netherlands, England, Paris, and New York. Career as tap dancer, teacher, and choreographer. Created productions for NTGent, Scala, and CC Evergem. Taught at Ballet van Vlaanderen and Conservatorium Gent. Founder of Tapdance Promotion.',
        bio: 'Lut Vermeulen studied physical education at the Rijksnormaalschool in Ghent. After her education, she devoted herself to tap dance. Following a five-year training in Belgium, the Netherlands, England, but mainly in Paris and New York, she started a career as a tap dancer and tap dance teacher.<br><br>She has contributed to dance, theater, and TV productions, including collaborations with the Ballet van Vlaanderen, Theater Antigone, and the BRT production Baraka.<br><br>In 1996, she created her first dance production, "Tap wherever you go," a unique adaptation of "Alice in Wonderland." This was followed by "Hit the Floor" for Ntgent, "Feet on Fire" at Scala, "Time to Tap" at CC Evergem, and "Let\'s Tap" at CC Evergem.<br><br>She taught at the Ballet Van Vlaanderen, Conservatorium Gent, and Stuc Leuven, and is now a permanent instructor at Tapdance Promotion and Dansateljee Dendermonde. Tap dance remains her great passion!',
        social: [{ type:'website', url:'http://tapdans.be', label:'tapdans.be' },{ type:'instagram', url:'https://www.instagram.com/tapdancepromotion', label:'@tapdancepromotion' },{ type:'facebook', url:'https://www.facebook.com/tapdancepromotion', label:'Tapdance Promotion' }] },
      { name: 'Alexandre', pageSlug: null,
        photo: 'https://images.squarespace-cdn.com/content/643161d3f0077c58bb466e03/25753ed3-1348-41ab-a27b-2e95a51d783d/Alexandre.jpg?content-type=image%2Fjpeg',
        origin: 'Belgium',
        tags: [{text:'Tap Dance', type:'style'},{text:'Rhythm Tap', type:'style'}],
        stats: [{v:'Barcelona', l:'Luthier Dance School'},{v:'Stage & street', l:'performer'}],
        bioShort: 'Started tap dancing with Lut at age 6. Trained at the Luthier Dance School in Barcelona. Performed in Russia, Spain, with big bands, and as a soloist in Tapdance Promotion shows. Passionate about swing, improvisation, and street performance.',
        bio: 'Alexandre started tap dancing with Lut when he was around 6 or 7 years old, and it became his first love right away, which it still is. He took lessons with Lut for many years, and later with Myriam Kuliasko from the Chantal Tinke Dance Studio. Alexandre joined "La tapisserie joyeuse," an improvisational tap dance group. They performed at Vooruit, Minard, Kinky Star, Charlatan, and even made the film "7 miles to the edge."<br><br>After a few years of silence, Alexandre picked up tap dancing again with Lut. He attended Lut\'s master\'s class and filled in for her during her surgery. It was then that Alexandre decided to fully commit and underwent a professional training for one year at the renowned "Luthier Dance School" in Barcelona. After that year, he started as a permanent instructor with Lut, as well as in Antwerp and Brussels.<br><br>Alexandre loves street performances, but he has also been on stage in Russia, Spain, with big bands, and as a soloist in Tapdance Promotion shows. He loves swing, improvisation, performing, and inspiring people. Rhythm and dance are something truly beautiful to him!',
        social: [{ type:'website', url:'http://tapdans.be', label:'tapdans.be' },{ type:'instagram', url:'https://www.instagram.com/tapdancepromotion', label:'@tapdancepromotion' }] },
      { name: 'Teddy', pageSlug: null,
        photo: 'https://images.squarespace-cdn.com/content/643161d3f0077c58bb466e03/65a395b1-2319-47c1-a82c-de4d201a80e5/Teddy.jpg?content-type=image%2Fjpeg',
        origin: 'Belgium',
        tags: [{text:'Tap Dance', type:'style'},{text:'Rhythm Tap', type:'style'}],
        stats: [{v:'10 yrs', l:'student under Lut'},{v:'Savion Glover', l:'inspiration'}],
        bioShort: 'Obsessed with hip-hop and tap dance from childhood. After 10 passionate years as a student under Alexandre and Lut, now a permanent staff member at Tapdance Promotion. Workshops with Michelle Dorrance, Jason Samuel Smith, Sara Reich, and more.',
        bio: 'Teddy was obsessed with hip-hop and tap dance as a young child. When he arrived in Belgium, he received a series of tap dance lessons as a birthday gift at Tapdance Promotion in Ghent. After the first lesson, he regretted not starting earlier!<br><br>When people think of tap dance, they usually think of Fred Astaire, Gene Kelly, Ginger Rogers — and they are fantastic tap dancers. Teddy is even more drawn to tap dancers who have brought innovation, with Savion Glover being his top choice. The Rhythm Tap style is truly his thing.<br><br>Teddy has attended workshops with Jason Janas, Sara Reich, Michelle Dorrance, Jason Samuel Smith, and many other renowned dancers who have a highly rhythmic style.<br><br>After 10 passionate years as a student under Alexandre and Lut, he has been a regular substitute for years, and is now starting as a permanent staff member at Tapdance Promotion. His philosophy: Tap, clap, slide, sing while you dance! Use your body, smile... enjoy!',
        social: [{ type:'website', url:'http://tapdans.be', label:'tapdans.be' },{ type:'instagram', url:'https://www.instagram.com/tapdancepromotion', label:'@tapdancepromotion' }] },
      { name: 'Jordan Souvandjiev', pageSlug: null,
        photo: 'https://images.squarespace-cdn.com/content/643161d3f0077c58bb466e03/55839d43-41ea-43da-9e88-116b68430bda/Jordan+Tap.jpeg?content-type=image%2Fjpeg',
        origin: 'Bulgaria / Belgium',
        tags: [{text:'Tap Dance', type:'style'},{text:'Folk dance', type:'style'}],
        stats: [{v:'15 yrs', l:'Bulgarian folk dance'},{v:'2019–2023', l:'taught in Dendermonde'}],
        bioShort: 'Born in Bulgaria in 1969, with 15 years of Bulgarian folk dance. Moved to Belgium in 1991. Studied tap under Lut Vermeulen for twelve years. Workshops with Josh Hilberman, Brenda Buffalino, Derick Grant, and others. Taught beginner tap at Dansateljee/Flow 2019–2023.',
        bio: 'Jordan Souvandjiev, born in 1969 in Bulgaria, spent 15 years of his youth immersed in Bulgarian folk dance. In 1991, he moved to Belgium, where he has been living and working ever since.<br><br>Twelve years ago, he began studying tap dance under Lut Vermeulen in Sint-Gillis Dendermonde. Over the years, he has participated in numerous workshops and masterclasses in Ghent, Antwerp, and Liège, learning from renowned artists like Josh Hilberman, Brenda Buffalino, Kurt Albert, Jason Janas, Sebastian Weber, Derick Grant, Joelle Ribant, and Laia Mollins.<br><br>Between 2019 and 2023, he taught beginner tap dance classes at Dansateljee/Flow in Sint-Gillis Dendermonde.',
        social: [{ type:'website', url:'http://tapdans.be', label:'tapdans.be' },{ type:'instagram', url:'https://www.instagram.com/tapdancepromotion', label:'@tapdancepromotion' }] }

  'Raqs Sharqi': {
    hook: 'Belly dance rooted in the golden era of Egyptian dance — precise, expressive, and deeply musical.',
    description: 'Raqs Sharqi (Arabic for "oriental dance") is the theatrical solo dance form that flourished in Egypt from the 1920s through the 1970s. Lenka Badriyah brings her international competition and performance background to classes that build from the foundation: hip isolations, undulations, layering, and the musical sensitivity that makes the dance alive. She co-organises the annual Leylet Raqs bellydance festival in Ghent.',
    descriptionsByLevel: {
      'Level 1': 'This class is your entry point into the world of raqs sharqi — the elegant classical dance of Egypt. We work on building solid foundations: correct posture and alignment, essential body mechanics, and the basic vocabulary of movement that Raqs Sharqi (oriental dance / bellydance) is built on. Alongside technique, we begin developing musical awareness — learning to listen to the music and respond to it with our bodies. Through dance combinations and guided movement exploration, you\'ll start to discover what your body is capable of and how to move with intention and ease. No previous dance experience is required.',
      'Level 2': 'This class is for dancers who already have a solid grounding in raqs sharqi fundamentals (equivalent to Level 1 or comparable experience). Each year, the group focuses on a specific thematic topic. This year, we work with a variety of Egyptian rhythmic patterns — saidi, baladi, malfuf, ayoub, fellahi, vox, masmoudi kabir, samai and others — and through them, we explore the distinct dance styles, aesthetics and characters that belong to each tradition. Hip technique is refined and deepened in context, so the body learns not just how to move, but why.',
      'Level 3': 'This is the most advanced group, and a space for dancers who are ready to expand beyond the familiar. This year, building on a strong foundation in traditional raqs sharqi, we explore a conscious, feeling-full approach to movement — bringing sensitivity and personal artistry into dialogue with the dance. This year, we are drawn into the world of contemporary qanun music, moving to the lyrical and luminous sounds of artists such as Farah Fersi and Maya Youssef. Here, tradition and innovation meet, and you are invited to shape your own dance expression — refined, personal, and alive.'
    },
    photo: 'https://images.squarespace-cdn.com/content/v1/643161d3f0077c58bb466e03/fe4cab00-85d3-484d-8b81-c279d67693b4/IsabelleHanneuse+%284%29.jpg',
    teacherBio: 'Silver Belly Dancer of the Universe 2012. Toured internationally with Bellydance Evolution (led by Jillina) for six years. Co-organiser of Leylet Raqs bellydance festival. Founder of the Kan Zaman Festival.',
    teacherBioFull: 'Badriyah is a professional Raqs Sharqi dancer (bellydancer), devoted mainly to Egyptian classical and folkloric styles, modern fusion and the Golden Age of belly dance. Badriyah has won several important awards - she was awarded as silver Belly Dancer of the Universe 2012 (California, USA), Vice Miss Bellydancer of Europe 2011 (Germany) and bronze Bellydancer of the Universe 2011 (California, USA). The biggest achievement of her dance career is performing for 6 years with Bellydance Evolution, led by the famous Jillina. She has performed in Japan, Hong Kong, USA, Taiwan, Australia, Morocco, Greece and other countries.<br><br>Her biggest passion is the history of Raqs Sharqi. She is a collector of vintage items depicting Egyptian dancers, and she is the organizer of Kan Zaman - The Golden Era Music & Dance Festival. She runs an online Raqs Sharqi Museum, and she plans to turn it into a physical museum based in Ghent.<br><br>Personally, the most wonderful thing for her is to see her students grow and fall in love with dance, no matter which forms the dance has.',
    social: [
      { type:'website',   url:'https://badriyahbellydance.com',                   label:'badriyahbellydance.com' },
      { type:'instagram', url:'https://www.instagram.com/lenka_badriyah',         label:'@lenka_badriyah' },
      { type:'facebook',  url:'https://www.facebook.com/lenkabadriyahdance',      label:'Lenka Badriyah Dance' },
      { type:'youtube',   url:'https://youtube.com/@Badriyah_bellydance',         label:'Badriyah Bellydance' }
    ],

  'African Congolese Dance': {
    hook: 'High-energy, communal, and rooted in the living traditions of Central Africa.',
    photo: 'https://images.squarespace-cdn.com/content/643161d3f0077c58bb466e03/4a5aa747-1681-435a-b7fd-67c815c3602a/Joseph.png?content-type=image%2Fpng',
    teacherOrigin: 'Democratic Republic of Congo',
    teacherBio: 'Joseph Simako Said is a highly talented dancer and choreographer from the Democratic Republic of Congo. He began his dance journey at the age of 11, performing with various prestigious groups across his home country. After moving to Europe, Joseph expanded his career by collaborating with prominent groups such as Staff de Leader, Vibrations Schengen, Groupe Kabola, and Groupe Furaya. His dynamic performances have graced numerous international festivals, showcasing his immense artistry, cultural dedication, and passion for sharing the joy of dance.',

  'Burlesque': {
    hook: 'Performance confidence built step by step — storytelling, presence, and a lot of fun.',
    description: 'Burlesque is a theatrical dance and performance art form that blends movement, character, confidence, storytelling, and playful audience interaction. Rooted in cabaret traditions, burlesque celebrates self-expression, stage presence, musicality, and creativity through stylised choreography and performance techniques. Classes explore body awareness, performance skills, theatrical expression, and the art of captivating an audience in a supportive and empowering environment. Age 18+.',
    teacherBio: 'Zoe Bizoe is an international burlesque champion with 7 international titles and a Belgium Got Talent finalist. Hendrik Lebon (Bibi Lebon) graduated from Fontys Dance Academy and performs with Les Ballets C de la B. Tine De Pauw (Ding Dong Dolores) graduated from the Academy for Theater in Tilburg (2014).',
    teachers: [
      { name: 'Zoe Bizoe',
        pageSlug: null,
        photo: 'https://images.squarespace-cdn.com/content/v1/643161d3f0077c58bb466e03/062d01d3-98f3-4e25-bf3a-d4183029e5df/Zoe+Bizoe.jpg',
        origin: 'Belgium',
        tags: [{text:'Burlesque', type:'style'},{text:'7× Intl Champion', type:'award'},{text:'BGT finalist', type:'award'}],
        stats: [{v:'7', l:'intl titles'},{v:'2017', l:'Cabaresque premiere'}],
        bioShort: 'International burlesque champion with 7 international titles. Belgium Got Talent finalist. Founder of &#8220;Cabaresque.&#8221; Motivational speaker focused on justice, equality, and self-love.',
        bio: 'Zoe Bizoe (real name Zoe Blyau) is an international burlesque champion with 7 international titles and a Belgium Got Talent finalist. Despite lacking formal dance training, her passion for theatre and drama propelled her to the top of the international burlesque scene. In November 2017 she premiered her one-woman show &#8220;Cabaresque,&#8221; blending cabaret, comedy, and burlesque. Beyond performing and teaching, she is a motivational speaker focused on themes of justice, equality, and self-love, helping students discover their power through performance presence.',
        social: [
          { type:'instagram', url:'https://www.instagram.com/zoebizoe', label:'@zoebizoe' }
        ]},
      { name: 'Hendrik Lebon',
        pageSlug: null,
        photo: 'https://images.squarespace-cdn.com/content/v1/643161d3f0077c58bb466e03/6faab140-e120-4262-b7c7-d3a773b8a41a/Hendrik.png',
        origin: 'Belgium',
        tags: [{text:'Burlesque', type:'style'},{text:'Dance theatre', type:'style'},{text:'Young Top Talent', type:'award'}],
        stats: [{v:'2005', l:'Fontys Academy'},{v:'Les Ballets C', l:'performs with'}],
        bioShort: 'Graduate of Fontys Dance Academy in Tilburg (2005), winner of the Jacques De Leeuw Young Top Talent Prize. Performed with Kopergietery, Theater Neon, and the Royal Ballet of Flanders. Currently performing in "Gardenia" by Les Ballets C de la B. Founder of Goodone Productions.',
        bio: 'Hendrik Lebon (Stage Name: Bibi Lebon) graduated from the Fontys Dance Academy in Tilburg in 2005, specializing in dance theater and modern dance, and won the Jacques De Leeuw Young Top Talent Prize. As a young dancer, he was active in Kopergietery and performed in his first dance production, "Mannen" by Ives Thuwis, which took him around the world. He also performed with Theater Neon and the Royal Ballet of Flanders.<br><br>Since then, he has worked as a dancer and choreographer in various national and international theater companies. Hendrik consistently combines different disciplines such as acting, circus, burlesque, singing, and music, specializing in creating unique combinations. Currently, he is performing as a dancer in the production "Gardenia" by Les Ballets C de la B, collaborating with the Scottish dance company Curious Seed, singing in two bands (including Les Quatre au Quai), and working in the advertising and television industry. This year, he founded his own company: Goodone Productions.<br><br><em>Photo Credit: Tuur Uyttenhove.</em>',
        social: [
          { type:'website',   url:'https://goodoneproductions.be',                    label:'goodoneproductions.be' },
          { type:'instagram', url:'https://www.instagram.com/hendrikbibilebon',        label:'@hendrikbibilebon' }
        ]},
      { name: 'Tine De Pauw',
        pageSlug: null,
        photo: 'https://images.squarespace-cdn.com/content/v1/643161d3f0077c58bb466e03/e2c40834-3f52-464b-bd61-354bd414a85d/Ding+Dong.png',
        photoCredit: 'Evy Ottermans',
        origin: 'Belgium',
        bioShort: 'Burlesque performer from Ghent (stage name: Ding Dong Dolores). Graduated from the Academy for Theater in Tilburg (2014).',
        bio: 'Tine De Pauw (stage name: Ding Dong Dolores) is a burlesque performer from Ghent. In 2014, she graduated from the Academy for Theater in Tilburg. Not long after, she discovered burlesque for the first time and was immediately captivated by its countless facets and possibilities of performance. As Ding Dong Dolores, Tine explores the boundaries of sensuality — each performance creates a small story in which she allows her body to triumph, captivating the audience.',

  'Cissy Ball': {
    hook: 'Move from your personal inner joy — no steps to memorise, no counts, just you and the music.',
    photo: 'https://images.squarespace-cdn.com/content/v1/643161d3f0077c58bb466e03/6faab140-e120-4262-b7c7-d3a773b8a41a/Hendrik.png',
    photoCredit: 'Tuur Uyttenhove',
    description: 'Cis-sy is a playful fusion between the words \'sissy\' and \'cis person\'. It symbolizes that everyone is welcome: the Sissys, their friends, and everyone else!<br><br>Cissy Ball is a dance class for people who love to perform and go crazy with music, rather than learning a new dance technique and memorizing different steps and counts. It is a dance style with origins in dance theater tradition (Pina Bausch, Alain Platel, etc.), where you move from your personal inner joy to dance. Dance steps and choreography are created together through games, assignments, and simple instructions. It\'s a party for life and a perfect way to let loose.<br><br>Lesson after lesson, you improve your performance skills, dance technique, and learn to use your body from the inside. The dance lessons are a 1.5h workshop, and each lesson ends in a show moment.',
    teacherBio: 'Hendrik Lebon (Stage Name: Bibi Lebon) graduated from the Fontys Dance Academy in Tilburg in 2005, specializing in dance theater and modern dance, and won the Jacques De Leeuw Young Top Talent Prize. As a young dancer, he was active in Kopergietery and performed in his first dance production, "Mannen" by Ives Thuwis, which took him around the world. He also performed with Theater Neon and the Royal Ballet of Flanders.<br><br>Since then, he has worked as a dancer and choreographer in various national and international theater companies. Hendrik consistently combines different disciplines such as acting, circus, burlesque, singing, and music, specializing in creating unique combinations. Currently, he is performing as a dancer in the production "Gardenia" by Les Ballets C de la B, collaborating with the Scottish dance company Curious Seed, singing in two bands (including Les Quatre au Quai), and working in the advertising and television industry. This year, he founded his own company: Goodone Productions.<br><br><em>Photo Credit: Tuur Uyttenhove.</em>',
    social: [
      { type:'website',   url:'https://goodoneproductions.be',                label:'goodoneproductions.be' },
      { type:'instagram', url:'https://www.instagram.com/hendrikbibilebon',     label:'@hendrikbibilebon' }
    ],
    alsoStyles: [

      { name: 'Argentine Tango',        slug: '/argentijnse-tango-danslessen-gent', meta: 'Thursday · L1 & L2' },

  'Bollyfolk': {
    hook: 'The best of Bollywood and folk dance in one class — colour, rhythm, and pure joy.',
    description: 'Each semester, Bollyfolk goes deep into one Indian folk tradition — the footwork, the rhythm, and the story behind the dance. We build from the basics to a full choreography set to Bollywood or traditional folk music, taking time to understand where each tradition comes from: what the music means, why people dance it, and the communities who created it. Folk dance in India is rooted in celebration — harvests, weddings, festivals. Every semester is different. Open level needs no experience; Level 2 builds on the previous semester.',
    descriptionsByLevel: {
      'Level 2': '<strong>This semester: Cheraw & Lavani.</strong> Cheraw is the bamboo dance of Mizoram — dancers step in and out of clapping bamboo poles, light feet and sharp timing. Lavani comes from Maharashtra: bold, theatrical, full of hip work and strong eye expression. Deeper material, longer choreography, more cultural context. Builds on Bollyfolk Open. Age 12+.',
      'Open':       '<strong>This semester: Garba Choreography & Khoriya.</strong> Garba comes from Gujarat — a Navratri circle dance built on light footwork, gentle claps, and community. Khoriya is the women\'s celebration dance of Haryana — strong, grounded footwork, swinging arms, and the joy of the village square. Age 12+.',
      'Open Level': '<strong>This semester: Garba Choreography & Khoriya.</strong> Garba comes from Gujarat — a Navratri circle dance built on light footwork, gentle claps, and community. Khoriya is the women\'s celebration dance of Haryana — strong, grounded footwork, swinging arms, and the joy of the village square. Age 12+.',
      'Level 1':    '<strong>This semester: Garba Choreography & Khoriya.</strong> Garba comes from Gujarat — a Navratri circle dance built on light footwork, gentle claps, and community. Khoriya is the women\'s celebration dance of Haryana — strong, grounded footwork, swinging arms, and the joy of the village square. Age 12+.'
    },
    photo: 'https://images.squarespace-cdn.com/content/v1/643161d3f0077c58bb466e03/7f197081-4589-42ac-b4e9-8fc370643767/Swapnil+folk.jpeg',
    teacherLabel: 'Swapnil Dagliya',
    teacherOrigin: 'Pune, India / Ghent, Belgium',
    teacherTags: [{text:'Folk Dance diploma', type:'award'},{text:'Learn Bhangra® cert.', type:'award'},{text:'GIDF curator', type:'award'}],
    teacherStats: [{v:'Folk diploma', l:'Indian folk dance'},{v:'Bhangra® cert.', l:'Learn Bhangra®'}],
    photoCredit: 'Stijn Dejonckheere',
    teacherBio: 'Holds a diploma in Indian folk dance and is a certified Learn Bhangra® instructor. Deep expertise in Garba, Rajasthani dances like Ghoomar and Kalbeliya, and folk styles from more than a dozen regions of India. Artistic director of Shoonya Dance Centre.',

// Source of truth: 6-tier pricing confirmed 2026-05-11
const WS_PRICE_TIERS = {
  30:  { full: 124, student: 110 },  // 10-session starter / miniseries baseline
  60:  { full: 198, student: 175 },
  70:  { full: 223, student: 197 },
  75:  { full: 231, student: 204 },
  90:  { full: 248, student: 219 },
  105: { full: 272, student: 240 },
};
const WS_STD_SESSIONS = 16;

// Compute full/student/uitpas price for a slot.
// Uses canonical tier from duration when available; falls back to meta prices.
// Prorates when sessionCount differs from WS_STD_SESSIONS (16).
function wsComputePrice(duration, sessionCount, fallbackFull, fallbackStudent) {
  const tier = WS_PRICE_TIERS[duration];
  const sc   = sessionCount || WS_STD_SESSIONS;
  const base = tier || (fallbackFull ? { full: fallbackFull, student: fallbackStudent || null } : null);
  if (!base || !base.full) return null;
  const isStd = sc === WS_STD_SESSIONS;
  const fp = isStd ? base.full    : Math.round(base.full    * sc / WS_STD_SESSIONS);
  const sp = base.student ? (isStd ? base.student : Math.ceil(base.student * sc / WS_STD_SESSIONS)) : null;
  const up = Math.round(fp * 0.2 * 100) / 100;
  return { full: fp, student: sp, uitpas: up };
}

// Look up WS_STYLE_DATA by style name, with fuzzy matching
function wsGetStyleData(styleName) {
  if (!styleName) return {};
  if (WS_STYLE_DATA[styleName]) return WS_STYLE_DATA[styleName];
  const lower = styleName.toLowerCase();
  const key = Object.keys(WS_STYLE_DATA).find(k =>
    lower.includes(k.toLowerCase()) || k.toLowerCase().includes(lower)
  );
  return key ? WS_STYLE_DATA[key] : {};
}

// CSS prefix: short slug from style name, e.g. "Flamenco & Sevillanas" → "fs"
function wsMakePrefix(styleName) {
  return (styleName || '').toLowerCase()
    .replace(/[^a-z0-9\s]/g, ' ').trim().split(/\s+/)
    .map(w => w[0] || '').join('').slice(0, 5) || 'st';
}

// Teacher initials from full name
function wsInitials(name) {
  return (name || '?').split(/\s+/).map(w => w[0] || '').join('').toUpperCase().slice(0, 2);
}

// Decide card layout: 'per-level' or 'day'
// Day-based only makes sense when there are MULTIPLE distinct days to choose from.
// If all levels fall on the same day (e.g. Argentine Tango L1+L2 both Thursday),
// per-level cards answer "which level am I?" — day-based would just show one day card.
function wsClassifyLayout(levels) {
  if (!levels || !levels.length) return 'none';
  const dayCounts = {};
  levels.forEach(lv => {
    (lv.slots || []).forEach(s => {
      if (s.day) dayCounts[s.day] = (dayCounts[s.day] || 0) + 1;
    });
  });
  const distinctDays = Object.keys(dayCounts).length;
  // Day-based: 5+ levels
  if (levels.length >= 5) return 'day';
  // Day-based: single day with 3+ levels (e.g. Bachata L1/L2/L3 all Tuesday)
  if (distinctDays === 1 && levels.length >= 3) return 'day';
  // Day-based: multiple days where at least one day has 2+ levels
  if (distinctDays > 1 && Object.values(dayCounts).some(c => c > 1)) return 'day';
  return 'per-level';
}

// Format ISO date array as "Sep 15, 22, 29 · Oct 6…"
function wsFormatDates(isoArr) {
  if (!isoArr || !isoArr.length) return '';
  const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const byMonth = {};
  const order = [];
  (isoArr.slice().sort()).forEach(iso => {
    const d = new Date(iso + 'T12:00:00');
    const key = d.getFullYear() + '-' + d.getMonth();
    if (!byMonth[key]) { byMonth[key] = { m: months[d.getMonth()], days: [] }; order.push(key); }
    byMonth[key].days.push(d.getDate());
  });
  return order.map(k => byMonth[k].m + ' ' + byMonth[k].days.join(', ')).join(' · ');
}

// Day-of-week to evening label, e.g. "Tuesday" → "Tuesday evenings"

  return day ? day + ' evenings' : '';

// "Tuesday" → "Tue" etc for the semester-tag
